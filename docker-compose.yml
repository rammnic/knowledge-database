name: knowledge-database

services:
  knowledge-db:
    image: postgres:16-alpine
    container_name: knowledge-db
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: knowledge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Оптимизация для 1GB RAM
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=4MB
      -c max_connections=20
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledge-network

  knowledge-app:
    image: rammnic1/knowledge:latest
    pull_policy: always
    container_name: knowledge-app
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://knowledge:${DB_PASSWORD}@knowledge-db:5432/knowledge
      - SECRET_TOKEN=${SECRET_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-minimax/minimax-m2.5}
      - OPENROUTER_PROVIDER_ORDER=${OPENROUTER_PROVIDER_ORDER:-sambanova,fireworks}
      - OPENROUTER_CONCURRENCY=${OPENROUTER_CONCURRENCY:-10}
      - NEXT_PUBLIC_URL=${NEXT_PUBLIC_URL:-https://smart.rammnic.space}
    restart: unless-stopped
    depends_on:
      knowledge-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - knowledge-network

volumes:
  postgres_data:
    driver: local

networks:
  knowledge-network:
    driver: bridge