name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: rammnic1/knowledge
  DEPLOY_PORT: 3002

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Перейти в директорию проекта
            cd /opt/knowledge-database

            # Логин в Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Стянуть новый образ
            docker-compose pull knowledge-app

            # Обновить переменные окружения
            cat > .env << 'EOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SECRET_TOKEN=${{ secrets.SECRET_TOKEN }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}
            OPENROUTER_PROVIDER_ORDER=${{ secrets.OPENROUTER_PROVIDER_ORDER }}
            OPENROUTER_CONCURRENCY=${{ secrets.OPENROUTER_CONCURRENCY }}
            NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}
            EOF

            # Поднять контейнеры
            docker-compose up -d

            # Ждать пока контейнер станет здоровым
            echo "Waiting for container to be healthy..."
            sleep 30

            # Проверить здоровье
            curl -f http://127.0.0.1:${{ env.DEPLOY_PORT }}/api/health || exit 1

            # Очистить неиспользуемые образы
            docker image prune -f

            echo "Deployment completed successfully!"